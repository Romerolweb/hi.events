# Local test for the All-in-One Dockerfile
# Usage: docker compose -f docker-compose.aio-local.yml up --build
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.all-in-one
      args:
        VITE_FRONTEND_URL: "http://localhost:8000"
        VITE_API_URL_CLIENT: "http://localhost:8000/api"
        VITE_API_URL_SERVER: "http://localhost:8000/api"
        VITE_STRIPE_PUBLISHABLE_KEY: ""
        VITE_APP_NAME: "Hi.Events"
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "base64:DT+6GEO7JPGZnSI2zJZJHZ3XPtv6YfYTMbaglwDWQQw="
      JWT_SECRET: "YgtRjG55Rzr414N7ZLrU1AddsdOF/isDS6g8/FhA3cg="
      DATABASE_URL: "postgresql://postgres:secret@postgres:5432/hi-events"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      LOG_CHANNEL: stderr
      QUEUE_CONNECTION: sync
      CACHE_STORE: file
      OCTANE_SERVER: frankenphp
      APP_FRONTEND_URL: "http://localhost:8000"
      APP_CDN_URL: "http://localhost:8000/storage"
      APP_DISABLE_REGISTRATION: "false"
      APP_SAAS_MODE_ENABLED: "false"
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: "test@example.com"
      MAIL_FROM_NAME: "Hi Events"
      FILESYSTEM_PUBLIC_DISK: public
      FILESYSTEM_PRIVATE_DISK: local
      STRIPE_PUBLIC_KEY: "pk_test_placeholder"
      STRIPE_SECRET_KEY: "sk_test_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_test_placeholder"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hi-events
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hi-events"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - aio_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  aio_pgdata:
